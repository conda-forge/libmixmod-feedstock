context:
  version: "2.1.11"

package:
  name: libmixmod
  version: ${{ version }}

source:
  url: https://github.com/mixmod/mixmod/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e95414decf5b2c2c5eebd7fca10e0100f2d753cbfca0694f4ac75da3b39b005e

build:
  number: 2

requirements:
  build:
    - cmake
    - ninja
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("cxx") }}
    - if: osx
      then: llvm-openmp
    - if: linux
      then: libgomp
  host:
    - eigen
  run_exports:
    - ${{ pin_subpackage('libmixmod', upper_bound='x.x') }}

tests:
  - script:
      - if: unix
        then:
          - test -f ${PREFIX}/include/mixmod.h
          - test -f ${PREFIX}/lib/libmixmod${SHLIB_EXT}
        else:
          - if not exist %PREFIX%\\Library\\include\\mixmod.h exit 1
          - if not exist %PREFIX%\\Library\\lib\\mixmod.lib exit 1

about:
  homepage: https://github.com/mixmod/mixmod
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: UTIL/gpl.txt
  summary: Supervised, Unsupervised, Semi-Supervised Classification with MIXture MODelling

extra:
  recipe-maintainers:
    - jschueller
